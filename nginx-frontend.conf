# Request rate limits (http context via conf.d include)
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Block unexpected HTTP methods early.
map $request_method $method_blocked {
  default 1;
  GET 0;
  POST 0;
  HEAD 0;
  OPTIONS 0;
  DELETE 0;
}

# Block obvious attack signatures in URI/query.
map $request_uri $uri_blocked {
  default 0;
  ~*(\.\./|\.\.%2f|%2e%2e%2f) 1;
  ~*(union(?:\+|%20)+select|select(?:\+|%20)+.*from|sleep\(|benchmark\(|load_file\(|into(?:\+|%20)+outfile) 1;
  ~*(<script|%3cscript|javascript:|onerror=|onload=) 1;
  ~*(/vendor/phpunit|eval-stdin\.php|/\.git|/\.env|/wp-admin|/wp-login\.php|xmlrpc\.php) 1;
  ~*(/boaform/admin|/cgi-bin/|/actuator|/jolokia|/\.aws/|/id_rsa) 1;
}

# Block SQLi-like signatures in query args specifically.
map $args $args_blocked {
  default 0;
  ~*(^|[&])[^=]*=(.*)(union(\+|%20)+select|sleep\(|benchmark\(|load_file\(|into(\+|%20)+outfile|or(\+|%20)+1=1|--|/\*) 1;
}

# HTTP 80: redirect to HTTPS
server {
  listen 80;
  server_name backendart.com;
  return 301 https://$host$request_uri;
}

# HTTPS 443
server {
  listen 443 ssl;
  http2 on;
  server_name backendart.com;

  root /usr/share/nginx/html;
  index index.html;

  # SSL
  ssl_certificate /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/certkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'TLS13-CHACHA20-POLY1305-SHA256:TLS13-AES-256-GCM-SHA384:TLS13-AES-128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305';
  ssl_prefer_server_ciphers on;
  ssl_ecdh_curve X25519:secp384r1:secp256r1;
  ssl_session_cache shared:SSL:50m;
  ssl_session_timeout 1d;
  ssl_session_tickets on;

  # Your certificate does not provide OCSP responder URL. Keep stapling off to avoid warnings.
  ssl_stapling off;
  ssl_stapling_verify off;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Basic hardening
  client_max_body_size 10m;
  # Temporarily disabled for debugging - these rules may block legitimate requests
  # if ($method_blocked) { return 444; }
  # if ($uri_blocked) { return 444; }
  # if ($args_blocked) { return 444; }

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

  # Block common scans and sensitive files.
  location ~* ^/(wp-|xmlrpc\.php|vendor/|\.env|\.git|phpinfo\.php|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock) {
    return 444;
  }

  # Block high-frequency exploit probe paths.
  location ~* ^/(wp-admin|wp-login\.php|wp-json|phpmyadmin|pma|HNAP1|nacos|jenkins|manager/html|console|cgi-bin|vendor/phpunit|solr|actuator|jolokia|graphql)$ {
    return 444;
  }

  # Block backup/source artifacts.
  location ~* \.(bak|old|orig|sql|swp|dist)$ {
    return 444;
  }

  # Deny hidden files, except ACME.
  location ~ /\.(?!well-known).* {
    return 444;
  }

  # Source map files are not needed online.
  location ~* \.map$ {
    return 404;
  }

  # Static assets: must exist, never fallback to index.html.
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # API
  location ^~ /api/ {
    # Temporarily disabled rate limiting for debugging
    # limit_except GET POST PUT DELETE OPTIONS { deny all; }
    # limit_req zone=api_per_ip burst=30 nodelay;
    # limit_conn conn_per_ip 50;

    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://sanmoo-server-go:28080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Web API (portal/public)
  location ^~ /web/ {
    proxy_pass http://sanmoo-server-go:28080/web/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Mini Program API
  location ^~ /mp/ {
    limit_except GET POST DELETE PUT OPTIONS { deny all; }
    limit_req zone=api_per_ip burst=30 nodelay;
    limit_conn conn_per_ip 50;

    proxy_pass http://sanmoo-server-go:28080/mp/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Uploaded files
  location ^~ /uploads/ {
    limit_except GET HEAD OPTIONS { deny all; }

    proxy_pass http://sanmoo-server-go:28080/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Sitemap and RSS - proxy to backend
  location = /sitemap.xml {
    proxy_pass http://sanmoo-server-go:28080/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1h;
  }

  location = /rss.xml {
    proxy_pass http://sanmoo-server-go:28080/rss.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1h;
  }

  # SPA fallback - serve static files directly
  location / {
    try_files $uri $uri/ /index.html;
  }
}