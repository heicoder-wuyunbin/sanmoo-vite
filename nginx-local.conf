# Request rate limits
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# HTTP only - No SSL for local testing
server {
  listen 80;
  server_name _;  # Accept any host

  root /usr/share/nginx/html;
  index index.html;

  # Basic hardening
  client_max_body_size 10m;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

  # Block common scans and sensitive files
  location ~* ^/(wp-|xmlrpc\.php|vendor/|\.env|\.git|phpinfo\.php|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock) {
    return 444;
  }

  # Block high-frequency exploit probe paths
  location ~* ^/(wp-admin|wp-login\.php|wp-json|phpmyadmin|pma|HNAP1|nacos|jenkins|manager/html|console|cgi-bin|vendor/phpunit|solr|actuator|jolokia|graphql)$ {
    return 444;
  }

  # Block backup/source artifacts
  location ~* \.(bak|old|orig|sql|swp|dist)$ {
    return 444;
  }

  # Deny hidden files, except ACME
  location ~ /\.(?!well-known).* {
    return 444;
  }

  # Source map files are not needed online
  location ~* \.map$ {
    return 404;
  }

  # Static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # API proxy
  location ^~ /api/ {
    rewrite ^/api(.*)$ $1 break;
    proxy_pass http://sanmoo-server-go:28080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Mini Program API
  location ^~ /mp/ {
    proxy_pass http://sanmoo-server-go:28080/mp/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # Uploaded files
  location ^~ /uploads/ {
    proxy_pass http://sanmoo-server-go:28080/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Sitemap and RSS - proxy to backend
  location = /sitemap.xml {
    proxy_pass http://sanmoo-server-go:28080/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1h;
  }

  location = /rss.xml {
    proxy_pass http://sanmoo-server-go:28080/rss.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1h;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
